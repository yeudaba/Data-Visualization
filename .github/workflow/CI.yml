name: React CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build-my-app:
    runs-on: ubuntu-latest

    steps:
    # Download the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Install Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    #  
    - name: Install Dependencies
      working-directory: ./frontend
      run: npm install

    #
    - name: Run Build
      working-directory: ./frontend
      run: npm run build